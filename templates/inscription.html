{% extends "base.html" %}
{% block title %}Inscription — MentorLink{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px">
    <h1>🎓 Créer un compte</h1>
    <p class="auth-sub">Rejoignez la communauté IFRI MentorLink</p>
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" name="nom" required placeholder="Adjovi" />
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" name="prenom" required placeholder="Koffi" />
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="koffi@etudiant.ifri.uac.bj" />
      </div>
      <div class="form-group">
        <label>Numéro de téléphone</label>
        <input type="tel" name="telephone" required placeholder="+229 97 00 00 00" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Filière</label>
          <select name="filiere" required>
            <option value="">-- Choisir --</option>
            <option value="GL">Génie Logiciel</option>
            <option value="IA">Intelligence Artificielle</option>
            <option value="IM">Informatique et Multimédia</option>
            <option value="SE_IoT">Systèmes Embarqués &amp; IoT</option>
            <option value="SI">Systèmes d'Information</option>
          </select>
        </div>
        <div class="form-group">
          <label>Niveau</label>
          <select name="niveau" required>
            <option value="">-- Choisir --</option>
            <option value="L1">Licence 1</option>
            <option value="L2">Licence 2</option>
            <option value="L3">Licence 3</option>
            <option value="M1">Master 1</option>
            <option value="M2">Master 2</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="mot_de_passe" required placeholder="••••••••" />
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="confirm_mdp" required placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary w-full">Créer mon compte</button>
    </form>
    <p class="auth-footer">Déjà inscrit ?
      <a href="{{ url_for('auth.login') }}">Se connecter</a>
    </p>
  </div>
</div>
{% endblock %}
