{% extends "base.html" %}
{% block title %}Nouvelle offre — MentorLink{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Publier une offre / demande</h2>
  <p>Proposez votre aide ou demandez un mentor sur une compétence précise</p>
</div>

<div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:560px;">
  <form method="POST">
    <div class="form-group">
      <label>Type</label>
      <select name="type_offre" required>
        <option value="offre">🟢 J'offre du mentorat (je suis mentor)</option>
        <option value="demande">🟠 Je cherche un mentor</option>
      </select>
    </div>
    <div class="form-group">
      <label>Compétence concernée</label>
      <select name="competence_id" required>
        <option value="">-- Choisir une compétence --</option>
        {% for c in competences %}
        <option value="{{ c.id }}">{{ c.nom }} ({{ c.categorie }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="form-group">
      <label>Format</label>
      <select name="format">
        <option value="les_deux">Présentiel & En ligne</option>
        <option value="presentiel">Présentiel uniquement</option>
        <option value="en_ligne">En ligne uniquement</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description (optionnel)</label>
      <textarea name="description" rows="4"
                placeholder="Décrivez ce que vous proposez ou ce dont vous avez besoin…"></textarea>
    </div>
    <div style="display:flex;gap:10px;">
      <button type="submit" class="btn btn-primary">Publier</button>
      <a href="{{ url_for('profil.dashboard') }}" class="btn btn-outline">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
